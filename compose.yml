services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pgms}
      POSTGRES_USER: ${POSTGRES_USER:-pgms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pgms}
    ports:
      - "5432:5432"
    volumes:
      - pgms-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pgms} -d ${POSTGRES_DB:-pgms}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env.example
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://pgms:pgms@db:5432/pgms}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,testserver,backend,pgr.fmu.edu.pk}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PGMS_BACKEND_HOST_PORT:-8026}:8000"
    command: >-
      sh -c "python manage.py migrate --noinput &&
      python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./.env.example
    environment:
      NEXT_PUBLIC_BACKEND_BASE_URL: ${NEXT_PUBLIC_BACKEND_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${PGMS_FRONTEND_HOST_PORT:-3026}:3000"
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  pgms-db-data:
